<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>羽毛球计分</title>
  <style>
    :root {
      --bg: #f4f7f3;
      --panel: #ffffff;
      --ink: #16231b;
      --muted: #647064;
      --line: rgba(255, 255, 255, 0.86);
      --court: #23734d;
      --court-dark: #1b5e3f;
      --service: #dff06b;
      --service-ink: #15210d;
      --winner: #ffcf57;
      --accent: #2563eb;
      --danger: #b42318;
      --shadow: 0 18px 45px rgba(23, 45, 29, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, #f7faf5 0%, var(--bg) 46%, #e9f0e5 100%);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      padding: 16px clamp(12px, 3vw, 28px) 12px;
    }

    .scorebar {
      display: grid;
      grid-template-columns: minmax(74px, 1fr) auto minmax(74px, 1fr);
      align-items: center;
      gap: 10px;
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .team-score {
      display: grid;
      justify-items: center;
      gap: 4px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(22, 35, 27, 0.08);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(26, 57, 35, 0.07);
      text-align: center;
    }

    .team-label {
      color: var(--muted);
      font-size: clamp(13px, 2.8vw, 15px);
    }

    .team-number {
      font-size: clamp(30px, 9vw, 58px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .score-separator {
      align-self: stretch;
      display: grid;
      place-items: center;
      min-width: 36px;
      color: #31503b;
      font-size: clamp(28px, 7vw, 48px);
      font-weight: 800;
    }

    .game-meta {
      width: min(760px, 100%);
      margin: 10px auto 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .serve-chip,
    .status-chip {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 11px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid rgba(22, 35, 27, 0.1);
      color: #22352a;
      box-shadow: 0 8px 18px rgba(26, 57, 35, 0.06);
      font-size: 14px;
    }

    .status-chip {
      color: var(--danger);
      font-weight: 700;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .control-btn,
    .primary-btn,
    .ghost-btn {
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .control-btn {
      background: #20382a;
      color: #fff;
      box-shadow: 0 8px 18px rgba(26, 57, 35, 0.13);
    }

    .control-btn.secondary {
      background: #fff;
      color: var(--ink);
      border-color: rgba(22, 35, 27, 0.12);
      box-shadow: 0 8px 18px rgba(26, 57, 35, 0.06);
    }

    .control-btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
      box-shadow: none;
    }

    .control-btn:not(:disabled):hover,
    .primary-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-1px);
    }

    .main {
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .players-panel {
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(22, 35, 27, 0.08);
      border-radius: 8px;
    }

    .players-panel.is-visible {
      display: grid;
    }

    .player-field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .player-field span {
      color: var(--muted);
      font-size: 12px;
    }

    .player-field input {
      width: 100%;
      min-width: 0;
      height: 36px;
      padding: 7px 8px;
      border-radius: 8px;
      border: 1px solid rgba(22, 35, 27, 0.16);
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .player-field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .court {
      position: relative;
      display: grid;
      grid-template-rows: repeat(2, minmax(0, 1fr));
      width: min(92vw, 560px);
      aspect-ratio: 0.58;
      max-height: min(68vh, 760px);
      min-height: 430px;
      margin: 0 auto;
      overflow: hidden;
      border: 5px solid var(--line);
      border-radius: 8px;
      background: var(--court);
      box-shadow: var(--shadow);
      outline: 1px solid rgba(15, 82, 49, 0.28);
    }

    .score-side {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      min-width: 0;
      min-height: 0;
      padding: 0;
      color: inherit;
      background: transparent;
      cursor: pointer;
      overflow: hidden;
    }

    .score-side + .score-side {
      border-top: 5px solid var(--line);
    }

    .score-side::before,
    .score-side::after {
      content: "";
      position: absolute;
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .score-side::before {
      inset: 10px;
      z-index: 4;
      border: 2px solid rgba(255, 255, 255, 0.48);
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(19, 50, 31, 0.2);
    }

    .score-side::after {
      content: attr(data-action);
      right: 16px;
      top: 14px;
      z-index: 5;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      padding: 5px 11px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      color: #173323;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(13, 45, 25, 0.16);
    }

    .score-side:hover:not(:disabled)::before,
    .score-side:focus-visible::before {
      border-color: rgba(255, 255, 255, 0.9);
    }

    .score-side:hover:not(:disabled)::after,
    .score-side:focus-visible::after {
      background: #fff;
      transform: translateY(-1px);
    }

    .score-side:focus-visible {
      outline: 4px solid rgba(37, 99, 235, 0.5);
      outline-offset: -8px;
      z-index: 6;
    }

    .score-side:disabled {
      cursor: not-allowed;
    }

    .score-side:disabled::after {
      opacity: 0;
    }

    .zone {
      position: relative;
      display: grid;
      place-items: center;
      padding: 14px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08), transparent 58%),
        var(--court);
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      overflow: hidden;
      transition: background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .zone + .zone {
      border-left: 4px solid var(--line);
    }

    .zone.is-alt {
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08), transparent 58%),
        var(--court-dark);
    }

    .zone.is-serving {
      background: linear-gradient(135deg, #f4ff96 0%, var(--service) 52%, #bfdc37 100%);
      color: var(--service-ink);
      box-shadow: inset 0 0 0 5px rgba(21, 33, 13, 0.12);
      z-index: 3;
    }

    .zone.is-winner {
      background: linear-gradient(135deg, #ffe28a 0%, var(--winner) 52%, #e6a928 100%);
      color: #3b2603;
      box-shadow: inset 0 0 0 5px rgba(59, 38, 3, 0.12);
      z-index: 3;
    }

    .zone-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 8px;
      justify-items: center;
      text-align: center;
      max-width: 100%;
    }

    .side-name {
      font-size: clamp(20px, 6vw, 36px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
    }

    .court-name,
    .server-name {
      min-height: 22px;
      padding: 3px 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.16);
      font-size: clamp(13px, 3.2vw, 16px);
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .zone.is-serving .court-name,
    .zone.is-serving .server-name,
    .zone.is-winner .court-name,
    .zone.is-winner .server-name {
      background: rgba(255, 255, 255, 0.5);
    }

    .server-name {
      font-weight: 700;
    }

    .server-name:empty {
      display: none;
    }

    .footer-link {
      width: min(760px, 100%);
      margin: 0 auto;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding-top: 2px;
      color: var(--ink);
      font-size: 14px;
    }

    .footer-link a {
      color: #114b8d;
      text-decoration: none;
      font-weight: 700;
      padding: 8px 10px;
      border-radius: 8px;
    }

    .footer-link a:hover,
    .footer-link a:focus-visible {
      text-decoration: underline;
      outline: none;
      background: rgba(17, 75, 141, 0.08);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(10, 18, 13, 0.5);
      backdrop-filter: blur(4px);
    }

    .overlay.is-open {
      display: grid;
    }

    .dialog {
      width: min(560px, 100%);
      max-height: min(86vh, 720px);
      overflow: auto;
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.65);
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 18px 10px;
      border-bottom: 1px solid rgba(22, 35, 27, 0.08);
    }

    .dialog-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .dialog-body {
      padding: 16px 18px 18px;
      display: grid;
      gap: 16px;
    }

    .setup-group {
      display: grid;
      gap: 10px;
    }

    .setup-label {
      color: var(--muted);
      font-size: 14px;
    }

    .setup-hint {
      margin: 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f3f6f1;
      color: #24362a;
      font-size: 14px;
      line-height: 1.5;
    }

    .choice-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .choice-btn {
      min-height: 52px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #f3f6f1;
      color: var(--ink);
      border: 1px solid rgba(22, 35, 27, 0.12);
      cursor: pointer;
      font-weight: 700;
    }

    .choice-btn.is-selected {
      color: #fff;
      background: #245c41;
      border-color: #245c41;
      box-shadow: 0 8px 18px rgba(36, 92, 65, 0.22);
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    .primary-btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
      box-shadow: none;
    }

    .ghost-btn {
      background: #fff;
      color: var(--ink);
      border-color: rgba(22, 35, 27, 0.12);
    }

    .record-list {
      display: grid;
      gap: 8px;
      max-height: 54vh;
      overflow: auto;
    }

    .record-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 12px;
      align-items: start;
      padding: 10px;
      background: #f7f9f5;
      border: 1px solid rgba(22, 35, 27, 0.08);
      border-radius: 8px;
    }

    .record-index {
      min-width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #20382a;
      color: #fff;
      font-weight: 800;
    }

    .record-main {
      display: grid;
      gap: 4px;
    }

    .record-score {
      font-weight: 800;
    }

    .record-next {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .empty-record {
      color: var(--muted);
      text-align: center;
      padding: 24px 8px;
      background: #f7f9f5;
      border-radius: 8px;
    }

    @media (max-width: 620px) {
      .app {
        gap: 10px;
        padding-top: 10px;
      }

      .scorebar {
        grid-template-columns: minmax(58px, 1fr) auto minmax(58px, 1fr);
      }

      .team-score {
        padding: 9px 10px;
      }

      .game-meta {
        align-items: stretch;
      }

      .serve-chip,
      .status-chip {
        width: 100%;
        justify-content: center;
      }

      .controls {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .control-btn {
        width: 100%;
        padding-inline: 8px;
      }

      .players-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .court {
        width: min(92vw, 430px);
        min-height: 390px;
        max-height: 62vh;
      }
    }

    @media (max-width: 380px) {
      .players-panel {
        grid-template-columns: 1fr;
      }

      .choice-row {
        grid-template-columns: 1fr;
      }

      .court {
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="scorebar" aria-live="polite">
        <section class="team-score" aria-label="A队比分">
          <div class="team-label">A队</div>
          <div class="team-number" id="scoreA">0</div>
        </section>
        <div class="score-separator">:</div>
        <section class="team-score" aria-label="B队比分">
          <div class="team-label">B队</div>
          <div class="team-number" id="scoreB">0</div>
        </section>
      </div>

      <div class="game-meta">
        <div class="serve-chip" id="serveInfo">请选择模式</div>
        <div class="controls">
          <button class="control-btn secondary" id="resetBtn" type="button">重置</button>
          <button class="control-btn secondary" id="undoBtn" type="button">撤回</button>
          <button class="control-btn" id="recordBtn" type="button">查看记录</button>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="players-panel" id="playersPanel" aria-label="双打球员">
        <label class="player-field">
          <span>A队 球员1</span>
          <input id="playerP1" maxlength="18" value="球员1">
        </label>
        <label class="player-field">
          <span>A队 球员2</span>
          <input id="playerP2" maxlength="18" value="球员2">
        </label>
        <label class="player-field">
          <span>B队 球员3</span>
          <input id="playerP3" maxlength="18" value="球员3">
        </label>
        <label class="player-field">
          <span>B队 球员4</span>
          <input id="playerP4" maxlength="18" value="球员4">
        </label>
      </section>

      <section class="court" aria-label="羽毛球场">
        <button class="score-side" id="score-side-A" type="button" data-side="A" data-action="A队得分" aria-label="A队得分">
          <span class="zone is-alt" id="zone-A-right" data-side="A" data-court="right" aria-label="A队右发球区">
            <span class="zone-content">
              <span class="side-name">A队</span>
              <span class="court-name">右发球区</span>
              <span class="server-name" data-server-label="A-right"></span>
            </span>
          </span>
          <span class="zone" id="zone-A-left" data-side="A" data-court="left" aria-label="A队左发球区">
            <span class="zone-content">
              <span class="side-name">A队</span>
              <span class="court-name">左发球区</span>
              <span class="server-name" data-server-label="A-left"></span>
            </span>
          </span>
        </button>
        <button class="score-side" id="score-side-B" type="button" data-side="B" data-action="B队得分" aria-label="B队得分">
          <span class="zone is-alt" id="zone-B-left" data-side="B" data-court="left" aria-label="B队左发球区">
            <span class="zone-content">
              <span class="side-name">B队</span>
              <span class="court-name">左发球区</span>
              <span class="server-name" data-server-label="B-left"></span>
            </span>
          </span>
          <span class="zone" id="zone-B-right" data-side="B" data-court="right" aria-label="B队右发球区">
            <span class="zone-content">
              <span class="side-name">B队</span>
              <span class="court-name">右发球区</span>
              <span class="server-name" data-server-label="B-right"></span>
            </span>
          </span>
        </button>
      </section>
    </main>

    <footer class="footer-link">
      <span>其他工具：</span>
      <a href="https://choi975.github.io/badminton-aa" target="_blank" rel="noopener">A球计算器</a>
    </footer>
  </div>

  <section class="overlay is-open" id="setupOverlay" role="dialog" aria-modal="true" aria-labelledby="setupTitle">
    <div class="dialog">
      <div class="dialog-header">
        <h1 class="dialog-title" id="setupTitle">开始计分</h1>
      </div>
      <div class="dialog-body">
        <p class="setup-hint">得分后，点击球场上半区给A队加分，点击下半区给B队加分。</p>
        <div class="setup-group">
          <div class="setup-label">比赛模式</div>
          <div class="choice-row">
            <button class="choice-btn" type="button" data-mode-choice="singles">单打</button>
            <button class="choice-btn" type="button" data-mode-choice="doubles">双打</button>
          </div>
        </div>
        <div class="setup-group">
          <div class="setup-label">先发球方</div>
          <div class="choice-row">
            <button class="choice-btn" type="button" data-first-choice="A">上方 A队</button>
            <button class="choice-btn" type="button" data-first-choice="B">下方 B队</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="overlay" id="recordsOverlay" role="dialog" aria-modal="true" aria-labelledby="recordsTitle">
    <div class="dialog">
      <div class="dialog-header">
        <h2 class="dialog-title" id="recordsTitle">计分记录</h2>
        <button class="ghost-btn" id="closeRecordsBtn" type="button">关闭</button>
      </div>
      <div class="dialog-body">
        <div class="record-list" id="recordList"></div>
      </div>
    </div>
  </section>

  <script>
    const initialPlayers = {
      p1: "球员1",
      p2: "球员2",
      p3: "球员3",
      p4: "球员4"
    };

    let state = createFreshState();
    let setupDraft = {
      mode: "",
      firstServer: ""
    };

    const scoreA = document.getElementById("scoreA");
    const scoreB = document.getElementById("scoreB");
    const serveInfo = document.getElementById("serveInfo");
    const resetBtn = document.getElementById("resetBtn");
    const undoBtn = document.getElementById("undoBtn");
    const recordBtn = document.getElementById("recordBtn");
    const playersPanel = document.getElementById("playersPanel");
    const setupOverlay = document.getElementById("setupOverlay");
    const recordsOverlay = document.getElementById("recordsOverlay");
    const recordList = document.getElementById("recordList");
    const closeRecordsBtn = document.getElementById("closeRecordsBtn");
    const modeChoiceButtons = document.querySelectorAll("[data-mode-choice]");
    const firstChoiceButtons = document.querySelectorAll("[data-first-choice]");
    const zoneButtons = document.querySelectorAll(".zone");
    const scoreButtons = document.querySelectorAll(".score-side");
    const playerInputs = {
      p1: document.getElementById("playerP1"),
      p2: document.getElementById("playerP2"),
      p3: document.getElementById("playerP3"),
      p4: document.getElementById("playerP4")
    };

    function createFreshState() {
      return {
        mode: "",
        started: false,
        score: { A: 0, B: 0 },
        servingSide: "",
        winner: "",
        players: { ...initialPlayers },
        positions: {
          A: { right: "p1", left: "p2" },
          B: { right: "p3", left: "p4" }
        },
        history: []
      };
    }

    function cloneState(source) {
      return JSON.parse(JSON.stringify(source));
    }

    function createGameSnapshot() {
      return cloneState({
        mode: state.mode,
        started: state.started,
        score: state.score,
        servingSide: state.servingSide,
        winner: state.winner,
        positions: state.positions
      });
    }

    function resetGame() {
      state = createFreshState();
      setupDraft = { mode: "", firstServer: "" };
      Object.entries(initialPlayers).forEach(([id, name]) => {
        playerInputs[id].value = name;
      });
      setChoiceState(modeChoiceButtons, "");
      setChoiceState(firstChoiceButtons, "");
      setupOverlay.classList.add("is-open");
      recordsOverlay.classList.remove("is-open");
      render();
    }

    function startGame() {
      if (!setupDraft.mode || !setupDraft.firstServer) return;
      state.mode = setupDraft.mode;
      state.servingSide = setupDraft.firstServer;
      state.started = true;
      setupOverlay.classList.remove("is-open");
      render();
    }

    function setChoiceState(buttons, value) {
      buttons.forEach((button) => {
        const isSelected =
          button.dataset.modeChoice === value || button.dataset.firstChoice === value;
        button.classList.toggle("is-selected", isSelected);
      });
    }

    function currentCourtFor(side = state.servingSide) {
      return state.score[side] % 2 === 0 ? "right" : "left";
    }

    function sideLabel(side) {
      return side === "A" ? "A队" : "B队";
    }

    function courtLabel(court) {
      return court === "right" ? "右发球区" : "左发球区";
    }

    function currentServeText() {
      if (!state.started) return "请选择模式";
      if (state.winner) {
        return `${sideLabel(state.winner)}获胜`;
      }

      const court = currentCourtFor();
      if (state.mode === "doubles") {
        const playerId = state.positions[state.servingSide][court];
        return `${sideLabel(state.servingSide)} ${state.players[playerId]} ${courtLabel(court)}`;
      }
      return `${sideLabel(state.servingSide)} ${courtLabel(court)}`;
    }

    function nextServeRecordText() {
      if (state.winner) {
        return `${sideLabel(state.winner)}获胜`;
      }

      const court = currentCourtFor();
      if (state.mode === "doubles") {
        const playerId = state.positions[state.servingSide][court];
        return `${sideLabel(state.servingSide)} ${state.players[playerId]} ${courtLabel(court)}发球`;
      }
      return `${sideLabel(state.servingSide)} ${courtLabel(court)}发球`;
    }

    function updatePlayerLabels() {
      document.querySelectorAll("[data-server-label]").forEach((label) => {
        const [side, court] = label.dataset.serverLabel.split("-");
        if (state.mode === "doubles") {
          const playerId = state.positions[side][court];
          label.textContent = state.players[playerId];
        } else {
          label.textContent = "";
        }
      });
    }

    function render() {
      scoreA.textContent = state.score.A;
      scoreB.textContent = state.score.B;
      serveInfo.textContent = currentServeText();
      undoBtn.disabled = state.history.length === 0;
      playersPanel.classList.toggle("is-visible", state.mode === "doubles");
      serveInfo.classList.toggle("status-chip", Boolean(state.winner));
      serveInfo.classList.toggle("serve-chip", !state.winner);
      updatePlayerLabels();

      zoneButtons.forEach((zone) => {
        const isServing =
          state.started &&
          !state.winner &&
          zone.dataset.side === state.servingSide &&
          zone.dataset.court === currentCourtFor();
        const isWinner = state.winner && zone.dataset.side === state.winner;
        zone.classList.toggle("is-serving", isServing);
        zone.classList.toggle("is-winner", Boolean(isWinner));
      });

      scoreButtons.forEach((button) => {
        button.disabled = !state.started || Boolean(state.winner);
      });
    }

    function scorePoint(scoringSide) {
      if (!state.started || state.winner) return;

      const before = createGameSnapshot();
      const servingBefore = state.servingSide;
      state.score[scoringSide] += 1;

      if (state.mode === "doubles") {
        if (scoringSide === servingBefore) {
          swapDoublesPositions(scoringSide);
        } else {
          state.servingSide = scoringSide;
        }
      } else {
        state.servingSide = scoringSide;
      }

      state.winner = detectWinner();
      state.history.push({
        snapshot: before,
        point: state.history.length + 1,
        scoringSide,
        scoreAfter: { ...state.score },
        nextServe: nextServeRecordText()
      });
      render();
    }

    function swapDoublesPositions(side) {
      const right = state.positions[side].right;
      state.positions[side].right = state.positions[side].left;
      state.positions[side].left = right;
    }

    function detectWinner() {
      const { A, B } = state.score;
      if (A >= 21 && A - B >= 2) return "A";
      if (B >= 21 && B - A >= 2) return "B";
      return "";
    }

    function undoPoint() {
      const last = state.history[state.history.length - 1];
      if (!last) return;
      const remainingHistory = state.history.slice(0, -1);
      state = {
        ...state,
        ...cloneState(last.snapshot),
        history: remainingHistory
      };
      Object.entries(state.players).forEach(([id, name]) => {
        playerInputs[id].value = name;
      });
      render();
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char];
      });
    }

    function renderRecords() {
      if (state.history.length === 0) {
        recordList.innerHTML = '<div class="empty-record">暂无记录</div>';
        return;
      }

      recordList.innerHTML = state.history
        .map((item) => {
          return `
            <article class="record-item">
              <div class="record-index">${item.point}</div>
              <div class="record-main">
                <div class="record-score">${escapeHTML(sideLabel(item.scoringSide))}得分，${item.scoreAfter.A} : ${item.scoreAfter.B}</div>
                <div class="record-next">下一拍：${escapeHTML(item.nextServe)}</div>
              </div>
            </article>
          `;
        })
        .join("");
    }

    modeChoiceButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setupDraft.mode = button.dataset.modeChoice;
        setChoiceState(modeChoiceButtons, setupDraft.mode);
        startGame();
      });
    });

    firstChoiceButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setupDraft.firstServer = button.dataset.firstChoice;
        setChoiceState(firstChoiceButtons, setupDraft.firstServer);
        startGame();
      });
    });

    resetBtn.addEventListener("click", resetGame);
    undoBtn.addEventListener("click", undoPoint);
    recordBtn.addEventListener("click", () => {
      renderRecords();
      recordsOverlay.classList.add("is-open");
    });
    closeRecordsBtn.addEventListener("click", () => {
      recordsOverlay.classList.remove("is-open");
    });

    recordsOverlay.addEventListener("click", (event) => {
      if (event.target === recordsOverlay) {
        recordsOverlay.classList.remove("is-open");
      }
    });

    scoreButtons.forEach((button) => {
      button.addEventListener("click", () => {
        scorePoint(button.dataset.side);
      });
    });

    Object.entries(playerInputs).forEach(([id, input]) => {
      input.addEventListener("input", () => {
        state.players[id] = input.value.trim() || initialPlayers[id];
        render();
      });
    });

    render();
  </script>
</body>
</html>
